# ============================================================
# INVENTRA — Decap CMS configuration
# Admin lives at  /admin/  and edits the JSON files in /content/.
# Saving commits to your Git repo, which auto-redeploys the site.
# ============================================================

# ---- AUTHENTICATION ----
# Configured for your GitHub Pages repo. Login uses your GitHub account via a
# small OAuth proxy — set base_url to your proxy URL (free Cloudflare Worker;
# see README "Admin panel"). Until then the admin loads but can't sign in.
backend:
  name: github
  repo: saadkhanbmte00/inventra
  branch: main
  base_url: https://REPLACE-WITH-YOUR-OAUTH-PROXY

# ---- ALTERNATIVE: host on Netlify (turnkey — NO proxy needed) ----
# Connect this repo to Netlify, enable Identity + Git Gateway, then use:
# backend:
#   name: git-gateway
#   branch: main

# Editorial workflow gives you draft → review → publish (optional).
# publish_mode: editorial_workflow

media_folder: "assets/img"
public_folder: "assets/img"
site_url: "https://REPLACE-WITH-YOUR-DOMAIN"
display_url: "https://REPLACE-WITH-YOUR-DOMAIN"
logo_url: "../favicon.svg"

collections:
  # ---------- Business details ----------
  - name: settings
    label: "⚙️ Business details"
    delete: false
    editor: { preview: false }
    files:
      - name: general
        label: "Contact & social"
        file: "content/settings.json"
        fields:
          - { name: company, label: "Company name", widget: string }
          - { name: email, label: "Email", widget: string }
          - { name: phone, label: "Phone (display)", widget: string }
          - { name: phone_href, label: "Phone (dial format, e.g. +15551234567)", widget: string }
          - { name: location, label: "Location", widget: string }
          - { name: response_time, label: "Response time", widget: string }
          - { name: linkedin, label: "LinkedIn URL", widget: string, required: false }
          - { name: github, label: "GitHub URL", widget: string, required: false }
          - { name: x, label: "X / Twitter URL", widget: string, required: false }

  # ---------- Projects ----------
  - name: projects
    label: "🛠️ Projects"
    delete: false
    editor: { preview: false }
    files:
      - name: list
        label: "Projects portfolio"
        file: "content/projects.json"
        fields:
          - name: items
            label: "Projects"
            label_singular: "Project"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: "Title", widget: string }
              - { name: category, label: "Filter category", widget: select, options: ["robotics", "automation", "embedded", "iot", "control", "design"] }
              - { name: badge, label: "Badge text", widget: string, hint: "Shown on the card, e.g. 'IoT · Automation'" }
              - { name: shape, label: "Icon", widget: select, options: ["robot", "building", "chip", "eye", "energy", "ml", "cube"] }
              - { name: description, label: "Description", widget: text }
              - { name: tags, label: "Tags", widget: list, field: { name: tag, label: "Tag", widget: string } }
              - { name: result, label: "Result line", widget: string, hint: "e.g. '99.2% accuracy · +40% throughput'" }

  # ---------- Blog / Insights ----------
  - name: blog
    label: "📝 Insights (blog)"
    delete: false
    editor: { preview: false }
    files:
      - name: posts
        label: "Blog posts"
        file: "content/blog.json"
        fields:
          - name: posts
            label: "Posts"
            label_singular: "Post"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: "Title", widget: string }
              - { name: slug, label: "URL slug", widget: string, hint: "lowercase-with-dashes; used in the post URL" }
              - { name: date, label: "Date", widget: date }
              - { name: category, label: "Category", widget: select, options: ["Automation", "Embedded", "IoT", "Control", "Robotics"] }
              - { name: reading_time, label: "Reading time", widget: string, default: "5 min read" }
              - { name: excerpt, label: "Excerpt", widget: text }
              - { name: featured, label: "Feature on blog page?", widget: boolean, default: false }
              - name: body
                label: "Body (Markdown — one block per line)"
                widget: list
                field: { name: line, label: "Line / paragraph (Markdown)", widget: string }
